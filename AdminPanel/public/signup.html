<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Admin Sign Up — Muslim Community</title>
    <meta name="description" content="Create an admin account for Muslim Community management dashboard.">
    <link rel="stylesheet" href="auth.css">
</head>
<body>

    <!-- Back to site -->
    <a href="../../index.html" class="auth-back-link">
        <svg fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24">
            <path stroke-linecap="round" stroke-linejoin="round" d="M10 19l-7-7m0 0l7-7m-7 7h18"/>
        </svg>
        Back to site
    </a>

    <div class="auth-container">
        <!-- Logo -->
        <div class="auth-logo">
            <div class="auth-logo-icon">
                <svg viewBox="0 0 100 100">
                    <circle cx="50" cy="50" r="45" fill="#ffffff"/>
                    <path d="M 62 30 A 24 24 0 1 0 62 70 A 28 28 0 1 1 62 30 Z" fill="#116530"/>
                    <polygon points="56,42 59,48 65,49 61,54 62,60 56,57 50,60 51,54 47,49 53,48" fill="#116530"/>
                </svg>
            </div>
            <div class="auth-logo-title">Muslim Community</div>
            <div class="auth-logo-subtitle">Administration Portal</div>
        </div>

        <!-- Signup Card -->
        <div class="auth-card">
            <div class="auth-card-header">
                <h1 class="auth-card-title">Create Account</h1>
                <p class="auth-card-desc">Set up your admin credentials to get started</p>
            </div>

            <!-- Message area -->
            <div class="auth-message" id="authMessage">
                <svg class="auth-message-icon" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24">
                    <path stroke-linecap="round" stroke-linejoin="round" d="M12 9v2m0 4h.01m-6.938 4h13.856c1.54 0 2.502-1.667 1.732-2.5L13.732 4c-.77-.833-1.964-.833-2.732 0L3.34 16.5c-.77.833.192 2.5 1.732 2.5z"/>
                </svg>
                <span id="authMessageText"></span>
            </div>

            <form class="auth-form" id="signupForm">
                <div class="auth-form-group">
                    <label for="signup-name">Full Name</label>
                    <div class="auth-input-wrapper">
                        <input
                            type="text"
                            id="signup-name"
                            class="auth-input"
                            placeholder="Your full name"
                            required
                            autocomplete="name"
                        >
                        <svg class="input-icon" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24">
                            <path stroke-linecap="round" stroke-linejoin="round" d="M16 7a4 4 0 11-8 0 4 4 0 018 0zM12 14a7 7 0 00-7 7h14a7 7 0 00-7-7z"/>
                        </svg>
                    </div>
                </div>

                <div class="auth-form-group">
                    <label for="signup-email">Email Address</label>
                    <div class="auth-input-wrapper">
                        <input
                            type="email"
                            id="signup-email"
                            class="auth-input"
                            placeholder="admin@example.com"
                            required
                            autocomplete="email"
                        >
                        <svg class="input-icon" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24">
                            <path stroke-linecap="round" stroke-linejoin="round" d="M3 8l7.89 5.26a2 2 0 002.22 0L21 8M5 19h14a2 2 0 002-2V7a2 2 0 00-2-2H5a2 2 0 00-2 2v10a2 2 0 002 2z"/>
                        </svg>
                    </div>
                </div>

                <div class="auth-form-group">
                    <label for="signup-password">Password</label>
                    <div class="auth-input-wrapper">
                        <input
                            type="password"
                            id="signup-password"
                            class="auth-input"
                            placeholder="Minimum 6 characters"
                            required
                            minlength="6"
                            autocomplete="new-password"
                        >
                        <svg class="input-icon" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24">
                            <path stroke-linecap="round" stroke-linejoin="round" d="M12 15v2m-6 4h12a2 2 0 002-2v-6a2 2 0 00-2-2H6a2 2 0 00-2 2v6a2 2 0 002 2zm10-10V7a4 4 0 00-8 0v4h8z"/>
                        </svg>
                        <button type="button" class="password-toggle" id="togglePassword1" aria-label="Toggle password visibility">
                            <svg fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24">
                                <path stroke-linecap="round" stroke-linejoin="round" d="M15 12a3 3 0 11-6 0 3 3 0 016 0z"/>
                                <path stroke-linecap="round" stroke-linejoin="round" d="M2.458 12C3.732 7.943 7.523 5 12 5c4.478 0 8.268 2.943 9.542 7-1.274 4.057-5.064 7-9.542 7-4.477 0-8.268-2.943-9.542-7z"/>
                            </svg>
                        </button>
                    </div>
                </div>

                <div class="auth-form-group">
                    <label for="signup-confirm">Confirm Password</label>
                    <div class="auth-input-wrapper">
                        <input
                            type="password"
                            id="signup-confirm"
                            class="auth-input"
                            placeholder="Re-enter your password"
                            required
                            minlength="6"
                            autocomplete="new-password"
                        >
                        <svg class="input-icon" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24">
                            <path stroke-linecap="round" stroke-linejoin="round" d="M9 12l2 2 4-4m5.618-4.016A11.955 11.955 0 0112 2.944a11.955 11.955 0 01-8.618 3.04A12.02 12.02 0 003 9c0 5.591 3.824 10.29 9 11.622 5.176-1.332 9-6.03 9-11.622 0-1.042-.133-2.052-.382-3.016z"/>
                        </svg>
                        <button type="button" class="password-toggle" id="togglePassword2" aria-label="Toggle password visibility">
                            <svg fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24">
                                <path stroke-linecap="round" stroke-linejoin="round" d="M15 12a3 3 0 11-6 0 3 3 0 016 0z"/>
                                <path stroke-linecap="round" stroke-linejoin="round" d="M2.458 12C3.732 7.943 7.523 5 12 5c4.478 0 8.268 2.943 9.542 7-1.274 4.057-5.064 7-9.542 7-4.477 0-8.268-2.943-9.542-7z"/>
                            </svg>
                        </button>
                    </div>
                </div>

                <button type="submit" class="auth-submit" id="signupBtn">
                    Create Account
                </button>
            </form>
        </div>

        <!-- Footer -->
        <div class="auth-footer">
            <p>Already have an account? <a href="login.html">Sign in</a></p>
        </div>
    </div>

    <script>
        const API_BASE = 'https://muslim-community.onrender.com/';

        // Password toggles
        document.getElementById('togglePassword1').addEventListener('click', () => {
            const input = document.getElementById('signup-password');
            input.type = input.type === 'password' ? 'text' : 'password';
        });

        document.getElementById('togglePassword2').addEventListener('click', () => {
            const input = document.getElementById('signup-confirm');
            input.type = input.type === 'password' ? 'text' : 'password';
        });

        // Show message helper
        function showMessage(text, type = 'error') {
            const msgEl = document.getElementById('authMessage');
            const msgText = document.getElementById('authMessageText');
            msgEl.className = `auth-message show ${type}`;
            msgText.textContent = text;
        }

        // Signup form
        document.getElementById('signupForm').addEventListener('submit', async (e) => {
            e.preventDefault();

            const btn = document.getElementById('signupBtn');
            const name = document.getElementById('signup-name').value.trim();
            const email = document.getElementById('signup-email').value.trim();
            const password = document.getElementById('signup-password').value;
            const confirm = document.getElementById('signup-confirm').value;

            if (!name || !email || !password || !confirm) {
                showMessage('Please fill in all fields.');
                return;
            }

            if (password.length < 6) {
                showMessage('Password must be at least 6 characters.');
                return;
            }

            if (password !== confirm) {
                showMessage('Passwords do not match.');
                return;
            }

            btn.disabled = true;
            btn.innerHTML = '<span class="spinner"></span> Creating account...';

            try {
                const res = await fetch(`${API_BASE}api/admin/signup`, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ name, email, password })
                });

                const data = await res.json();

                if (res.ok) {
                    showMessage('Account created! Redirecting to login...', 'success');
                    setTimeout(() => {
                        window.location.href = 'login.html';
                    }, 1500);
                } else {
                    showMessage(data.message || 'Signup failed. Please try again.');
                    btn.disabled = false;
                    btn.textContent = 'Create Account';
                }
            } catch (err) {
                showMessage('Server is unreachable. Make sure the backend is running.');
                btn.disabled = false;
                btn.textContent = 'Create Account';
            }
        });
    </script>
</body>
</html>
